<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HardSoft - Tipos de Servico</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>HardSoft</h1><p>Gestao de OS</p></div>
            <ul class="sidebar-nav">
                <li><a href="../index.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="ordens-servico.html"><span class="nav-icon">📋</span> Ordens de Servico</a></li>
                <li><a href="clientes.html"><span class="nav-icon">👥</span> Clientes</a></li>
                <li><a href="admins.html"><span class="nav-icon">👤</span> Admins</a></li>
                <li><a href="setups.html"><span class="nav-icon">💻</span> Setups</a></li>
                <li><a href="pecas.html"><span class="nav-icon">🔧</span> Pecas</a></li>
                <li><a href="tipos-servico.html" class="active"><span class="nav-icon">⚙️</span> Tipos de Servico</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div><h2>Tipos de Servico</h2><p>Catalogo de servicos oferecidos pela empresa</p></div>
                <button class="btn btn-primary" onclick="novo()">+ Novo Tipo</button>
            </div>
            <div class="card"><div id="lista"><div class="loader-container"><div class="loader"></div></div></div></div>
        </main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo">Novo Tipo de Servico</h3>
                <button class="modal-close" onclick="closeModal('modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form">
                    <input type="hidden" name="idTipoServico">
                    <div class="form-group"><label>Nome <span class="required">*</span></label>
                        <input type="text" name="nome" maxlength="100" required></div>
                    <div class="form-group"><label>Descricao</label>
                        <textarea name="descricao" maxlength="255"></textarea></div>
                    <div class="form-group"><label>Valor Base <span class="required">*</span></label>
                        <input type="number" step="0.01" min="0" name="valorBase" required></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script>
    async function carregar() {
        try {
            const tipos = await tipoServicoAPI.listar();
            if (tipos.length === 0) {
                $('#lista').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚙️</div><p>Nenhum tipo cadastrado</p></div>`;
                return;
            }
            $('#lista').innerHTML = `
                <div class="table-wrapper"><table>
                    <thead><tr><th>ID</th><th>Nome</th><th>Descricao</th><th>Valor Base</th><th>Acoes</th></tr></thead>
                    <tbody>
                        ${tipos.map(t => `
                            <tr>
                                <td>#${t.idTipoServico}</td>
                                <td><strong>${t.nome}</strong></td>
                                <td>${t.descricao || '-'}</td>
                                <td>${formatarMoeda(t.valorBase)}</td>
                                <td class="table-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="editar(${t.idTipoServico})">Editar</button>
                                    <button class="btn btn-sm btn-danger" onclick="deletar(${t.idTipoServico})">Excluir</button>
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>`;
        } catch (err) { toast(err.message, 'error'); }
    }
    function novo() {
        $('#modal-titulo').textContent = 'Novo Tipo de Servico';
        $('#form').reset(); openModal('modal');
    }
    async function editar(id) {
        try {
            const t = await tipoServicoAPI.buscar(id);
            const f = $('#form');
            f.idTipoServico.value = t.idTipoServico; f.nome.value = t.nome;
            f.descricao.value = t.descricao || ''; f.valorBase.value = t.valorBase;
            $('#modal-titulo').textContent = `Editar Tipo #${id}`;
            openModal('modal');
        } catch (err) { toast(err.message, 'error'); }
    }
    async function deletar(id) {
        if (!confirmar(`Excluir tipo de servico #${id}?`)) return;
        try { await tipoServicoAPI.deletar(id); toast('Excluido'); carregar(); }
        catch (err) { toast(err.message, 'error'); }
    }
    $('#form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = coletarForm(e.target);
        const id = data.idTipoServico; delete data.idTipoServico;
        data.valorBase = Number(data.valorBase);
        try {
            if (id) { await tipoServicoAPI.atualizar(id, data); toast('Tipo atualizado'); }
            else    { await tipoServicoAPI.criar(data); toast('Tipo criado'); }
            closeModal('modal'); carregar();
        } catch (err) { toast(err.message, 'error'); }
    });
    carregar();
    </script>
</body>
</html>
