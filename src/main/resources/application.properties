# === SQL SERVER (descomentar quando for usar em producao) ===
spring.datasource.url=jdbc:sqlserver://Matheus\\SQLEXPRESS:1433;databaseName=HardSoftDB;encrypt=true;trustServerCertificate=true;
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=aluno
spring.datasource.password=dba

# === JPA / HIBERNATE ===
# create-drop: recria as tabelas a cada start (bom pra dev, NUNCA em producao)
# Em producao usar 'validate' ou 'none' e gerenciar com Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === ENCODING ===
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true

# === SERVER ===
server.port=8080
