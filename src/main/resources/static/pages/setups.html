<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HardSoft - Setups</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>HardSoft</h1><p>Gestao de OS</p></div>
            <ul class="sidebar-nav">
                <li><a href="../index.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="ordens-servico.html"><span class="nav-icon">📋</span> Ordens de Servico</a></li>
                <li><a href="clientes.html"><span class="nav-icon">👥</span> Clientes</a></li>
                <li><a href="admins.html"><span class="nav-icon">👤</span> Admins</a></li>
                <li><a href="setups.html" class="active"><span class="nav-icon">💻</span> Setups</a></li>
                <li><a href="pecas.html"><span class="nav-icon">🔧</span> Pecas</a></li>
                <li><a href="tipos-servico.html"><span class="nav-icon">⚙️</span> Tipos de Servico</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div><h2>Setups</h2><p>Configuracoes de computadores dos clientes</p></div>
                <button class="btn btn-primary" onclick="novoSetup()">+ Novo Setup</button>
            </div>
            <div class="card"><div id="lista"><div class="loader-container"><div class="loader"></div></div></div></div>
        </main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo">Novo Setup</h3>
                <button class="modal-close" onclick="closeModal('modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form">
                    <input type="hidden" name="idSetup">
                    <div class="form-group">
                        <label>Cliente <span class="required">*</span></label>
                        <select name="idCliente" required></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Marca</label><input type="text" name="marca" maxlength="50"></div>
                        <div class="form-group"><label>Modelo</label><input type="text" name="modelo" maxlength="50"></div>
                    </div>
                    <div class="form-group"><label>Processador</label><input type="text" name="processador" maxlength="100"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Memoria RAM</label><input type="text" name="memoria" placeholder="ex: 16GB DDR4" maxlength="50"></div>
                        <div class="form-group"><label>Placa de Video</label><input type="text" name="placaDeVideo" maxlength="100"></div>
                    </div>
                    <div class="form-group"><label>Armazenamento</label><input type="text" name="armazenamento" placeholder="ex: SSD 512GB" maxlength="100"></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script>
    let clientesCache = [];

    async function carregar() {
        try {
            const [setups, clientes] = await Promise.all([setupAPI.listar(), clienteAPI.listar()]);
            clientesCache = clientes;
            if (setups.length === 0) {
                $('#lista').innerHTML = `<div class="empty-state"><div class="empty-state-icon">💻</div><p>Nenhum setup cadastrado</p></div>`;
                return;
            }
            $('#lista').innerHTML = `
                <div class="table-wrapper"><table>
                    <thead><tr><th>ID</th><th>Cliente</th><th>Marca/Modelo</th><th>Processador</th><th>RAM</th><th>Armazenamento</th><th>Acoes</th></tr></thead>
                    <tbody>
                        ${setups.map(s => `
                            <tr>
                                <td>#${s.idSetup}</td>
                                <td>${s.nomeCliente || '-'}</td>
                                <td>${[s.marca, s.modelo].filter(Boolean).join(' ') || '-'}</td>
                                <td>${s.processador || '-'}</td>
                                <td>${s.memoria || '-'}</td>
                                <td>${s.armazenamento || '-'}</td>
                                <td class="table-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="editar(${s.idSetup})">Editar</button>
                                    <button class="btn btn-sm btn-danger" onclick="deletar(${s.idSetup})">Excluir</button>
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>`;
        } catch (err) { toast(err.message, 'error'); }
    }

    function novoSetup() {
        $('#modal-titulo').textContent = 'Novo Setup';
        $('#form').reset();
        preencherSelect($('#form select[name=idCliente]'), clientesCache, 'id', c => `${c.nome} (${formatarCpfCnpj(c.cpfCnpj)})`);
        openModal('modal');
    }
    async function editar(id) {
        try {
            const s = await setupAPI.buscar(id);
            const f = $('#form');
            preencherSelect(f.idCliente, clientesCache, 'id', c => `${c.nome} (${formatarCpfCnpj(c.cpfCnpj)})`);
            f.idSetup.value = s.idSetup; f.idCliente.value = s.idCliente;
            f.marca.value = s.marca || ''; f.modelo.value = s.modelo || '';
            f.processador.value = s.processador || ''; f.memoria.value = s.memoria || '';
            f.placaDeVideo.value = s.placaDeVideo || ''; f.armazenamento.value = s.armazenamento || '';
            $('#modal-titulo').textContent = `Editar Setup #${id}`;
            openModal('modal');
        } catch (err) { toast(err.message, 'error'); }
    }
    async function deletar(id) {
        if (!confirmar(`Excluir setup #${id}?`)) return;
        try { await setupAPI.deletar(id); toast('Setup excluido'); carregar(); }
        catch (err) { toast(err.message, 'error'); }
    }
    $('#form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = coletarForm(e.target);
        const id = data.idSetup; delete data.idSetup;
        data.idCliente = Number(data.idCliente);
        try {
            if (id) { await setupAPI.atualizar(id, data); toast('Setup atualizado'); }
            else    { await setupAPI.criar(data); toast('Setup criado'); }
            closeModal('modal'); carregar();
        } catch (err) { toast(err.message, 'error'); }
    });
    carregar();
    </script>
</body>
</html>
