<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HardSoft - Pecas</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>HardSoft</h1><p>Gestao de OS</p></div>
            <ul class="sidebar-nav">
                <li><a href="../index.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="ordens-servico.html"><span class="nav-icon">📋</span> Ordens de Servico</a></li>
                <li><a href="clientes.html"><span class="nav-icon">👥</span> Clientes</a></li>
                <li><a href="admins.html"><span class="nav-icon">👤</span> Admins</a></li>
                <li><a href="setups.html"><span class="nav-icon">💻</span> Setups</a></li>
                <li><a href="pecas.html" class="active"><span class="nav-icon">🔧</span> Pecas</a></li>
                <li><a href="tipos-servico.html"><span class="nav-icon">⚙️</span> Tipos de Servico</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div><h2>Pecas</h2><p>Estoque de pecas para servicos</p></div>
                <button class="btn btn-primary" onclick="novaPeca()">+ Nova Peca</button>
            </div>

            <div class="toolbar">
                <input class="search-input" placeholder="Buscar por nome..." id="busca" oninput="buscar()">
                <button class="btn btn-secondary" onclick="$('#busca').value=''; carregar();">Limpar</button>
            </div>

            <div class="card"><div id="lista"><div class="loader-container"><div class="loader"></div></div></div></div>
        </main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo">Nova Peca</h3>
                <button class="modal-close" onclick="closeModal('modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form">
                    <input type="hidden" name="idPeca">
                    <div class="form-group"><label>Nome <span class="required">*</span></label>
                        <input type="text" name="nome" maxlength="100" required></div>
                    <div class="form-group"><label>Descricao</label>
                        <input type="text" name="descricao" maxlength="200"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Marca</label><input type="text" name="marca" maxlength="50"></div>
                        <div class="form-group"><label>Condicao</label>
                            <select name="condicao"><option value="">-</option><option>Novo</option><option>Usado</option></select>
                        </div>
                    </div>
                    <div class="form-row-3">
                        <div class="form-group"><label>Preco Custo</label>
                            <input type="number" step="0.01" min="0" name="precoCusto"></div>
                        <div class="form-group"><label>Preco Venda <span class="required">*</span></label>
                            <input type="number" step="0.01" min="0" name="precoVenda" required></div>
                        <div class="form-group"><label>Qtd Estoque <span class="required">*</span></label>
                            <input type="number" min="0" name="qntEstoque" required></div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script>
    let timeoutBusca;
    function buscar() {
        clearTimeout(timeoutBusca);
        timeoutBusca = setTimeout(carregar, 300);
    }

    async function carregar() {
        try {
            const nome = $('#busca').value.trim();
            const pecas = await pecaAPI.listar(nome || null);
            if (pecas.length === 0) {
                $('#lista').innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔧</div><p>${nome ? 'Nenhuma peca encontrada' : 'Nenhuma peca cadastrada'}</p></div>`;
                return;
            }
            $('#lista').innerHTML = `
                <div class="table-wrapper"><table>
                    <thead><tr><th>ID</th><th>Nome</th><th>Marca</th><th>Cond.</th><th>Custo</th><th>Venda</th><th>Estoque</th><th>Acoes</th></tr></thead>
                    <tbody>
                        ${pecas.map(p => {
                            const alerta = p.qntEstoque <= 5;
                            return `
                            <tr>
                                <td>#${p.idPeca}</td>
                                <td>${p.nome}</td>
                                <td>${p.marca || '-'}</td>
                                <td>${p.condicao || '-'}</td>
                                <td>${formatarMoeda(p.precoCusto)}</td>
                                <td>${formatarMoeda(p.precoVenda)}</td>
                                <td>${alerta
                                    ? `<strong style="color:var(--danger)">${p.qntEstoque} ⚠️</strong>`
                                    : p.qntEstoque}</td>
                                <td class="table-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="editar(${p.idPeca})">Editar</button>
                                    <button class="btn btn-sm btn-danger" onclick="deletar(${p.idPeca})">Excluir</button>
                                </td>
                            </tr>`}).join('')}
                    </tbody>
                </table></div>`;
        } catch (err) { toast(err.message, 'error'); }
    }

    function novaPeca() {
        $('#modal-titulo').textContent = 'Nova Peca';
        $('#form').reset();
        openModal('modal');
    }
    async function editar(id) {
        try {
            const p = await pecaAPI.buscar(id);
            const f = $('#form');
            f.idPeca.value = p.idPeca; f.nome.value = p.nome;
            f.descricao.value = p.descricao || ''; f.marca.value = p.marca || '';
            f.condicao.value = p.condicao || ''; f.precoCusto.value = p.precoCusto || '';
            f.precoVenda.value = p.precoVenda; f.qntEstoque.value = p.qntEstoque;
            $('#modal-titulo').textContent = `Editar Peca #${id}`;
            openModal('modal');
        } catch (err) { toast(err.message, 'error'); }
    }
    async function deletar(id) {
        if (!confirmar(`Excluir peca #${id}?`)) return;
        try { await pecaAPI.deletar(id); toast('Peca excluida'); carregar(); }
        catch (err) { toast(err.message, 'error'); }
    }
    $('#form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = coletarForm(e.target);
        const id = data.idPeca; delete data.idPeca;
        // converte numeros
        if (data.precoCusto) data.precoCusto = Number(data.precoCusto);
        data.precoVenda = Number(data.precoVenda);
        data.qntEstoque = Number(data.qntEstoque);
        try {
            if (id) { await pecaAPI.atualizar(id, data); toast('Peca atualizada'); }
            else    { await pecaAPI.criar(data); toast('Peca criada'); }
            closeModal('modal'); carregar();
        } catch (err) { toast(err.message, 'error'); }
    });
    carregar();
    </script>
</body>
</html>
