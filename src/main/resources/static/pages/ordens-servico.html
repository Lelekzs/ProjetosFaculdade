<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HardSoft - Ordens de Servico</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>HardSoft</h1><p>Gestao de OS</p></div>
            <ul class="sidebar-nav">
                <li><a href="../index.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="ordens-servico.html" class="active"><span class="nav-icon">📋</span> Ordens de Servico</a></li>
                <li><a href="clientes.html"><span class="nav-icon">👥</span> Clientes</a></li>
                <li><a href="admins.html"><span class="nav-icon">👤</span> Admins</a></li>
                <li><a href="setups.html"><span class="nav-icon">💻</span> Setups</a></li>
                <li><a href="pecas.html"><span class="nav-icon">🔧</span> Pecas</a></li>
                <li><a href="tipos-servico.html"><span class="nav-icon">⚙️</span> Tipos de Servico</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div><h2>Ordens de Servico</h2><p>Acompanhamento de todas as OSs</p></div>
                <button class="btn btn-primary" onclick="abrirNovaOS()">+ Nova OS</button>
            </div>

            <div class="toolbar">
                <select id="filtro-status" class="search-input" onchange="carregar()">
                    <option value="">Todos os status</option>
                    <option value="ABERTA">Aberta</option>
                    <option value="EM_ANDAMENTO">Em Andamento</option>
                    <option value="AGUARDANDO_PECA">Aguardando Peca</option>
                    <option value="CONCLUIDA">Concluida</option>
                    <option value="ENTREGUE">Entregue</option>
                    <option value="CANCELADA">Cancelada</option>
                </select>
            </div>

            <div class="card"><div id="lista"><div class="loader-container"><div class="loader"></div></div></div></div>
        </main>
    </div>

    <!-- Modal nova OS -->
    <div class="modal-overlay" id="modal-nova">
        <div class="modal">
            <div class="modal-header">
                <h3>Nova Ordem de Servico</h3>
                <button class="modal-close" onclick="closeModal('modal-nova')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form-nova">
                    <div class="form-group">
                        <label>Cliente <span class="required">*</span></label>
                        <select name="idCliente" id="select-cliente" required onchange="carregarSetupsDoCliente()"></select>
                    </div>
                    <div class="form-group">
                        <label>Setup (equipamento) <span class="required">*</span></label>
                        <select name="idSetup" id="select-setup" required>
                            <option value="">Selecione o cliente primeiro...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Admin responsavel <span class="required">*</span></label>
                        <select name="idAdmin" required id="select-admin"></select>
                    </div>
                    <div class="form-group">
                        <label>Defeito relatado <span class="required">*</span></label>
                        <textarea name="defeito" required placeholder="Descreva o problema relatado pelo cliente..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-nova')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Abrir OS</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script>
    async function carregar() {
        try {
            const status = $('#filtro-status').value;
            const oss = await osAPI.listar(status || null);
            if (oss.length === 0) {
                $('#lista').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><p>Nenhuma OS encontrada</p></div>`;
                return;
            }
            $('#lista').innerHTML = `
                <div class="table-wrapper"><table>
                    <thead><tr>
                        <th>OS</th><th>Cliente</th><th>Equipamento</th><th>Admin</th>
                        <th>Entrada</th><th>Status</th><th>Valor</th><th></th>
                    </tr></thead>
                    <tbody>
                        ${oss.map(o => `
                            <tr>
                                <td><strong>#${o.idOrdemServico}</strong></td>
                                <td>${o.nomeCliente}</td>
                                <td>${o.descricaoSetup || '-'}</td>
                                <td>${o.nomeAdmin || '-'}</td>
                                <td>${formatarData(o.dataEntrada)}</td>
                                <td>${badgeStatus(o.status)}</td>
                                <td><strong>${formatarMoeda(o.valorTotal)}</strong></td>
                                <td><a href="os-detalhe.html?id=${o.idOrdemServico}" class="btn btn-sm btn-primary">Abrir</a></td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>`;
        } catch (err) { toast(err.message, 'error'); }
    }

    async function abrirNovaOS() {
        try {
            const [clientes, admins] = await Promise.all([clienteAPI.listar(), adminAPI.listar()]);
            if (clientes.length === 0) { toast('Cadastre um cliente primeiro', 'warning'); return; }
            if (admins.length === 0) { toast('Cadastre um admin primeiro', 'warning'); return; }
            preencherSelect($('#select-cliente'), clientes, 'id', c => `${c.nome} (${formatarCpfCnpj(c.cpfCnpj)})`);
            preencherSelect($('#select-admin'), admins, 'id', a => `${a.nome}${a.cargo ? ` (${a.cargo})` : ''}`);
            $('#select-setup').innerHTML = '<option value="">Selecione o cliente primeiro...</option>';
            $('#form-nova').reset();
            openModal('modal-nova');
        } catch (err) { toast(err.message, 'error'); }
    }

    async function carregarSetupsDoCliente() {
        const idCliente = $('#select-cliente').value;
        if (!idCliente) { $('#select-setup').innerHTML = '<option value="">Selecione o cliente primeiro...</option>'; return; }
        try {
            const setups = await setupAPI.listarPorCliente(idCliente);
            if (setups.length === 0) {
                $('#select-setup').innerHTML = '<option value="">Cliente sem setups cadastrados!</option>';
                toast('Esse cliente nao tem nenhum setup. Cadastre um em "Setups".', 'warning');
            } else {
                preencherSelect($('#select-setup'), setups, 'idSetup',
                    s => `${s.marca || ''} ${s.modelo || ''} - ${s.processador || ''}`.trim());
            }
        } catch (err) { toast(err.message, 'error'); }
    }

    $('#form-nova').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = coletarForm(e.target);
        data.idCliente = Number(data.idCliente);
        data.idSetup = Number(data.idSetup);
        data.idAdmin = Number(data.idAdmin);
        try {
            const os = await osAPI.criar(data);
            toast(`OS #${os.idOrdemServico} criada com sucesso!`);
            closeModal('modal-nova');
            // redireciona pra detalhar (adicionar servicos/pecas)
            window.location.href = `os-detalhe.html?id=${os.idOrdemServico}`;
        } catch (err) { toast(err.message, 'error'); }
    });

    carregar();
    </script>
</body>
</html>
