<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HardSoft - Clientes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>HardSoft</h1><p>Gestao de OS</p></div>
            <ul class="sidebar-nav">
                <li><a href="../index.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="ordens-servico.html"><span class="nav-icon">📋</span> Ordens de Servico</a></li>
                <li><a href="clientes.html" class="active"><span class="nav-icon">👥</span> Clientes</a></li>
                <li><a href="admins.html"><span class="nav-icon">👤</span> Admins</a></li>
                <li><a href="setups.html"><span class="nav-icon">💻</span> Setups</a></li>
                <li><a href="pecas.html"><span class="nav-icon">🔧</span> Pecas</a></li>
                <li><a href="tipos-servico.html"><span class="nav-icon">⚙️</span> Tipos de Servico</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>Clientes</h2>
                    <p>Gerenciamento de clientes do sistema</p>
                </div>
                <button class="btn btn-primary" onclick="novoCliente()">+ Novo Cliente</button>
            </div>

            <div class="card">
                <div id="lista-clientes"><div class="loader-container"><div class="loader"></div></div></div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-cliente">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-titulo">Novo Cliente</h3>
                <button class="modal-close" onclick="closeModal('modal-cliente')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form-cliente">
                    <input type="hidden" name="id">
                    <div class="form-group">
                        <label>Nome <span class="required">*</span></label>
                        <input type="text" name="nome" maxlength="100" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" name="email" maxlength="100" required>
                        </div>
                        <div class="form-group">
                            <label>Senha <span class="required">*</span></label>
                            <input type="password" name="senha" minlength="6" maxlength="60" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>CPF/CNPJ <span class="required">*</span> <small style="color:var(--text-muted)">(so numeros, 11 ou 14 digitos)</small></label>
                            <input type="text" name="cpfCnpj" pattern="\d{11}|\d{14}" required>
                        </div>
                        <div class="form-group">
                            <label>RG</label>
                            <input type="text" name="rg" maxlength="20">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="text" name="telefone" maxlength="20">
                        </div>
                        <div class="form-group">
                            <label>Endereco</label>
                            <input type="text" name="endereco" maxlength="200">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-cliente')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script>
    async function carregar() {
        try {
            const clientes = await clienteAPI.listar();
            if (clientes.length === 0) {
                $('#lista-clientes').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>Nenhum cliente cadastrado ainda</p>
                    </div>`;
                return;
            }
            $('#lista-clientes').innerHTML = `
                <div class="table-wrapper">
                <table>
                    <thead><tr>
                        <th>ID</th><th>Nome</th><th>CPF/CNPJ</th>
                        <th>Email</th><th>Telefone</th><th>Acoes</th>
                    </tr></thead>
                    <tbody>
                        ${clientes.map(c => `
                            <tr>
                                <td>#${c.id}</td>
                                <td>${c.nome}</td>
                                <td>${formatarCpfCnpj(c.cpfCnpj)}</td>
                                <td>${c.email}</td>
                                <td>${c.telefone || '-'}</td>
                                <td class="table-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="editar(${c.id})">Editar</button>
                                    <button class="btn btn-sm btn-danger" onclick="deletar(${c.id})">Excluir</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                </div>`;
        } catch (err) {
            toast(err.message, 'error');
            $('#lista-clientes').innerHTML = `<div class="empty-state">Erro ao carregar: ${err.message}</div>`;
        }
    }

    function novoCliente() {
        $('#modal-titulo').textContent = 'Novo Cliente';
        $('#form-cliente').reset();
        $('#form-cliente').querySelector('[name=id]').value = '';
        openModal('modal-cliente');
    }

    async function editar(id) {
        try {
            const c = await clienteAPI.buscar(id);
            $('#modal-titulo').textContent = `Editar Cliente #${id}`;
            const form = $('#form-cliente');
            form.id.value = c.id;
            form.nome.value = c.nome;
            form.email.value = c.email;
            form.senha.value = ''; // nao expõe a senha
            form.cpfCnpj.value = c.cpfCnpj;
            form.rg.value = c.rg || '';
            form.telefone.value = c.telefone || '';
            form.endereco.value = c.endereco || '';
            openModal('modal-cliente');
        } catch (err) { toast(err.message, 'error'); }
    }

    async function deletar(id) {
        if (!confirmar(`Excluir o cliente #${id}? Esta acao nao pode ser desfeita.`)) return;
        try {
            await clienteAPI.deletar(id);
            toast('Cliente excluido com sucesso');
            carregar();
        } catch (err) { toast(err.message, 'error'); }
    }

    $('#form-cliente').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = coletarForm(e.target);
        const id = data.id;
        delete data.id;
        try {
            if (id) {
                await clienteAPI.atualizar(id, data);
                toast('Cliente atualizado');
            } else {
                await clienteAPI.criar(data);
                toast('Cliente criado');
            }
            closeModal('modal-cliente');
            carregar();
        } catch (err) { toast(err.message, 'error'); }
    });

    carregar();
    </script>
</body>
</html>
